services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: foundry
      POSTGRES_PASSWORD: foundry_dev
      POSTGRES_DB: the_foundry
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foundry -d the_foundry"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
